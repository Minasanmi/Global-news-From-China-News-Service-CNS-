<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全球新闻速览</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: rgba(10, 19, 35, 0.92);
        --line: rgba(148, 163, 184, 0.18);
        --text: #e7eefb;
        --muted: #8fa3c3;
        --accent: #4f8cff;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: linear-gradient(180deg, #07111f 0%, #0b1630 100%);
        color: var(--text);
      }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 18px;
        padding: 18px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
      }
      .side { padding: 20px; }
      .main { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0; }
      .muted { color: var(--muted); }
      .tabs, .sources, .cards { display: flex; flex-direction: column; gap: 10px; }
      .toolbar, .stats { display: grid; gap: 10px; }
      .toolbar { grid-template-columns: 1fr auto auto; }
      .stats { grid-template-columns: repeat(4, 1fr); }
      .btn, .tab, input {
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        padding: 12px 14px;
        font-size: 14px;
      }
      .btn, .tab { cursor: pointer; }
      .tab.active { background: rgba(79,140,255,0.18); border-color: rgba(79,140,255,0.55); }
      .btn.primary { background: linear-gradient(135deg, #3973f4 0%, #4f8cff 100%); border: none; }
      .stat, .status, .source, .card {
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.03);
        border-radius: 18px;
      }
      .stat { padding: 14px; }
      .stat strong { display: block; margin-top: 8px; font-size: 24px; }
      .status { padding: 12px 14px; display: flex; justify-content: space-between; gap: 10px; }
      .source { padding: 10px 12px; font-size: 13px; }
      .card { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
      .card h3 { margin: 0; font-size: 20px; line-height: 1.4; }
      .card p { line-height: 1.6; color: #c7d4ea; }
      .row { display: flex; flex-wrap: wrap; gap: 8px; }
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .empty {
        padding: 36px 18px;
        text-align: center;
        border: 1px dashed var(--line);
        border-radius: 18px;
        color: var(--muted);
      }
      @media (max-width: 1100px) {
        .app { grid-template-columns: 1fr; }
        .stats { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 720px) {
        .toolbar, .stats { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel side">
        <h1>全球新闻速览</h1>
        <p class="muted">实时聚合国内外新闻，支持搜索、分类和自动刷新。</p>
        <div style="height:16px"></div>
        <div class="tabs" id="tabs"></div>
        <div style="height:18px"></div>
        <div class="muted" style="margin-bottom:10px">已接入新闻源</div>
        <div class="sources" id="sources"></div>
        <div style="height:18px"></div>
        <div class="source">启动立即刷新一次</div>
        <div class="source">每 5 分钟自动刷新</div>
        <div class="source">支持点击查看原文</div>
      </aside>

      <main class="panel main">
        <div class="toolbar">
          <input id="search" type="text" placeholder="搜索标题、摘要、来源..." />
          <button id="refresh" class="btn primary">立即刷新</button>
          <button id="clear" class="btn">清空搜索</button>
        </div>

        <div class="stats">
          <div class="stat"><span class="muted">全部新闻</span><strong id="sAll">0</strong></div>
          <div class="stat"><span class="muted">国内新闻</span><strong id="sDomestic">0</strong></div>
          <div class="stat"><span class="muted">国际新闻</span><strong id="sInternational">0</strong></div>
          <div class="stat"><span class="muted">当前结果</span><strong id="sVisible">0</strong></div>
        </div>

        <div class="status">
          <div>
            <div id="statusText">准备就绪</div>
            <div class="muted" id="statusMeta">等待首次刷新</div>
          </div>
          <div class="row" id="errors"></div>
        </div>

        <section class="cards" id="cards"></section>
      </main>
    </div>

    <script>
      const state = { list: [], filter: 'all', keyword: '', fetchedAt: '' };
      const tabs = [
        { key: 'all', label: '全部新闻' },
        { key: 'domestic', label: '国内新闻' },
        { key: 'international', label: '国际新闻' }
      ];

      const el = {
        tabs: document.getElementById('tabs'),
        sources: document.getElementById('sources'),
        cards: document.getElementById('cards'),
        search: document.getElementById('search'),
        refresh: document.getElementById('refresh'),
        clear: document.getElementById('clear'),
        statusText: document.getElementById('statusText'),
        statusMeta: document.getElementById('statusMeta'),
        errors: document.getElementById('errors'),
        sAll: document.getElementById('sAll'),
        sDomestic: document.getElementById('sDomestic'),
        sInternational: document.getElementById('sInternational'),
        sVisible: document.getElementById('sVisible')
      };

      function esc(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function fmtTime(v) {
        if (!v) return '时间未知';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return '时间未知';
        return new Intl.DateTimeFormat('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        }).format(d);
      }

      function filtered() {
        const kw = state.keyword.trim().toLowerCase();
        return state.list.filter((item) => {
          const regionOk = state.filter === 'all' || item.region === state.filter;
          const text = `${item.title} ${item.summary} ${item.source}`.toLowerCase();
          const kwOk = !kw || text.includes(kw);
          return regionOk && kwOk;
        });
      }

      function renderTabs() {
        el.tabs.innerHTML = tabs.map((t) => `<button class="tab ${t.key === state.filter ? 'active' : ''}" data-key="${t.key}">${t.label}</button>`).join('');
        el.tabs.querySelectorAll('[data-key]').forEach((node) => {
          node.addEventListener('click', () => {
            state.filter = node.dataset.key;
            renderTabs();
            render();
          });
        });
      }

      function render() {
        const list = filtered();
        const domestic = state.list.filter((i) => i.region === 'domestic').length;
        const international = state.list.filter((i) => i.region === 'international').length;
        el.sAll.textContent = state.list.length;
        el.sDomestic.textContent = domestic;
        el.sInternational.textContent = international;
        el.sVisible.textContent = list.length;

        if (!list.length) {
          el.cards.innerHTML = '<div class="empty">当前没有匹配结果，请切换分类或修改搜索词。</div>';
          return;
        }

        el.cards.innerHTML = list.map((item) => `
          <article class="card">
            <div class="row">
              <span class="pill">${item.region === 'domestic' ? '国内' : '国际'}</span>
              <span class="pill">${esc(item.source)}</span>
              <span class="pill">${esc(fmtTime(item.publishedAt))}</span>
            </div>
            <h3>${esc(item.title)}</h3>
            <p>${esc(item.summary || '暂无摘要')}</p>
            <div class="row">
              <button class="btn" data-open="${esc(item.link || '')}">查看原文</button>
            </div>
          </article>
        `).join('');

        el.cards.querySelectorAll('[data-open]').forEach((node) => {
          node.addEventListener('click', () => {
            const url = node.dataset.open;
            if (url) window.newsAPI.openLink(url);
          });
        });
      }

      function renderSources(sources) {
        el.sources.innerHTML = sources.map((s) => `<div class="source">${esc(s.name)} · ${s.region === 'domestic' ? '国内' : '国际'}</div>`).join('');
      }

      function renderErrors(errors) {
        el.errors.innerHTML = errors.map((e) => `<span class="pill">${esc(e)}</span>`).join('');
      }

      async function refreshNews(auto = false) {
        el.refresh.disabled = true;
        el.statusText.textContent = auto ? '正在自动刷新新闻…' : '正在刷新新闻…';
        el.statusMeta.textContent = '正在从新闻源拉取最新内容';
        try {
          const result = await window.newsAPI.fetchNews();
          state.list = Array.isArray(result.articles) ? result.articles : [];
          state.fetchedAt = result.fetchedAt || '';
          renderSources(result.sources || []);
          renderErrors(result.errors || []);
          renderTabs();
          render();
          el.statusText.textContent = `已更新 ${state.list.length} 条新闻`;
          el.statusMeta.textContent = `最近刷新：${fmtTime(state.fetchedAt)} · 自动刷新间隔 5 分钟`;
        } catch (error) {
          renderErrors(['应用刷新失败']);
          el.statusText.textContent = '刷新失败';
          el.statusMeta.textContent = error instanceof Error ? error.message : '未知错误';
        } finally {
          el.refresh.disabled = false;
        }
      }

      el.search.addEventListener('input', (e) => {
        state.keyword = e.target.value || '';
        render();
      });
      el.refresh.addEventListener('click', () => refreshNews(false));
      el.clear.addEventListener('click', () => {
        state.keyword = '';
        el.search.value = '';
        render();
      });

      renderTabs();
      render();
      refreshNews(false);
      setInterval(() => refreshNews(true), 300000);
    </script>
  </body>
</html>
